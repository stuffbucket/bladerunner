<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <!-- Squircle surface: dark editor/terminal, subtle vertical lift -->
    <linearGradient id="surface" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#11161D"/>
      <stop offset="1" stop-color="#0B0F14"/>
    </linearGradient>

    <!-- Brand ramp, mapped across the bounding box of the "br" mark.
         userSpaceOnUse with x1..x2 spanning the glyphs guarantees the
         full purple->green ramp lands on the letters themselves. -->
    <linearGradient id="brand" gradientUnits="userSpaceOnUse"
                    x1="232" y1="0" x2="760" y2="0">
      <stop offset="0.00" stop-color="#8A5CF6"/>
      <stop offset="0.20" stop-color="#5865F2"/>
      <stop offset="0.40" stop-color="#3B82F6"/>
      <stop offset="0.60" stop-color="#06B6D4"/>
      <stop offset="0.80" stop-color="#10B981"/>
      <stop offset="1.00" stop-color="#34D399"/>
    </linearGradient>

    <linearGradient id="sheen" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.06"/>
      <stop offset="0.18" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <!-- Apple-style squircle. r = 229 ~= 22.4% of 1024. Built from
         straight edges + quadratic-ish smooth corners that approximate
         the continuous-curvature superellipse. -->
    <path id="squircle" d="
      M 24 253
      C 24 116, 116 24, 253 24
      L 771 24
      C 908 24, 1000 116, 1000 253
      L 1000 771
      C 1000 908, 908 1000, 771 1000
      L 253 1000
      C 116 1000, 24 908, 24 771
      Z"/>
    <clipPath id="tileClip"><use href="#squircle"/></clipPath>
  </defs>

  <!-- Tile -->
  <use href="#squircle" fill="url(#surface)"/>
  <g clip-path="url(#tileClip)">
    <rect x="0" y="0" width="1024" height="1024" fill="url(#sheen)"/>
    <use href="#squircle" fill="none" stroke="#FFFFFF" stroke-opacity="0.05" stroke-width="3"/>
  </g>

  <!-- ============================================================
       "br" mark — hand-built rounded-mono letterforms.
       Shared stem weight 78. x-height top y=430, baseline y=726.
       b ascender top y=286. Filled with the brand gradient.
       ============================================================ -->
  <g fill="url(#brand)">

    <!-- b : stem + bowl ring, fused. Even-odd punches the counter.
         Stem top rounded slightly for the rounded-mono character. -->
    <path fill-rule="evenodd" d="
      M 256 296
      a 39 39 0 0 1 78 0
      v 148
      a 152 152 0 1 1 -78 132
      V 296
      Z
      M 334 596
      a 92 92 0 1 0 0 -0.5
      Z
    "/>

    <!-- r : stem + slimmer shoulder arm. Arm rises from stem top,
         curves up and right, terminating in a soft rounded tip. -->
    <path d="
      M 558 469
      a 39 39 0 0 1 78 0
      v 28
      c 28 -44 70 -67 120 -64
      a 37 37 0 0 1 -4 74
      c -33 -2 -61 11 -82 41
      c -9 13 -34 8 -34 -15
      V 726
      h -78
      Z"/>
  </g>

  <!-- Prompt / blinking-cursor accent block on the baseline, right of r.
       Reads as a terminal caret; reinforces the dev-tool feel. -->
  <rect x="772" y="642" width="52" height="84" rx="12" fill="url(#brand)" opacity="0.85"/>
</svg>
