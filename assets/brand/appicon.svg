<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#B14FFF"/>
      <stop offset="0.2" stop-color="#6E5BFF"/>
      <stop offset="0.4" stop-color="#2BD4FF"/>
      <stop offset="0.6" stop-color="#22D3EE"/>
      <stop offset="0.8" stop-color="#FF4FD8"/>
      <stop offset="1" stop-color="#FF6FA3"/>
    </linearGradient>
  </defs>
  <rect width="1024" height="1024" rx="229" fill="#0B0F14"/>
  <!-- Clean bold 'br' monogram, slightly slanted to echo the brand's slant
       motif, in the brand's vaporwave gradient. Legible at every icon size. -->
  <g transform="translate(512 560) skewX(-8) translate(-512 -560)">
    <text x="512" y="742" text-anchor="middle"
          font-family="Helvetica Neue, Helvetica, Arial, sans-serif"
          font-weight="800" font-size="620" letter-spacing="-8"
          fill="url(#g)">br</text>
  </g>
</svg>
