name: Release macOS DMG

# Reusable: build Bladerunner.app, Developer-ID sign + notarize + staple it into
# a DMG, attach it to the release, and sync the Homebrew cask. Called by
# release-please.yml when the release is cut AND vars.ENABLE_SIGNED_DMG == 'true'.
#
# Runs on the SELF-HOSTED macOS runner (the same instance maximal uses) because
# Developer-ID signing + Apple notarization need the signing keychain and Apple
# credentials, which GitHub-hosted runners don't have. Notarizing the .dmg also
# notarizes the .app inside it (Apple notarizes nested files), so a separate
# .app notarize/staple isn't needed for drag-to-Applications distribution.
#
# Bladerunner.app has a single executable (the `br` binary), so — unlike
# maximal's Tauri+sidecar bundle — signing the .app top-level (with the VZ
# entitlement + hardened runtime) signs everything; no inside-out pre-signing.
#
# ── ONE-TIME PREREQUISITES (mirror maximal) ─────────────────────────────────
#   1. A self-hosted macOS (Apple Silicon) runner registered to this repo/org,
#      with a signing keychain holding the Developer ID Application identity.
#   2. Repo variable  ENABLE_SIGNED_DMG = true   (turns this job on).
#   3. Repo/org secrets: DEVELOPER_ID_APPLICATION, APPLE_ID, APPLE_PASSWORD
#      (an app-specific password), APPLE_TEAM_ID, KEYCHAIN_PASSWORD, and
#      HOMEBREW_TAP_TOKEN (already present, for the cask push).
# Until (1)-(3) exist, the caller gates this off, so releases are unaffected.

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to build + attach the DMG for (e.g. v0.4.1)
        required: true
        type: string

permissions:
  contents: write

jobs:
  dmg:
    name: Signed + notarized DMG (arm64)
    runs-on: self-hosted
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Resolve names
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          {
            echo "VERSION=${VERSION}"
            echo "DMG=Bladerunner-${VERSION}.dmg"
          } >> "$GITHUB_ENV"

      - name: Build br + assemble Bladerunner.app
        run: |
          set -euo pipefail
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o bin/br ./cmd/bladerunner
          rm -rf dist-dmg && mkdir -p dist-dmg
          ./bin/br menubar bundle --output dist-dmg
          ls -la dist-dmg/Bladerunner.app/Contents

      - name: Unlock signing keychain
        env:
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          KC="$HOME/Library/Keychains/bladerunner.keychain-db"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KC"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KC"
          security list-keychains -d user -s "$KC"

      # Sign the .app with Developer ID + hardened runtime and the VZ
      # entitlement (com.apple.security.virtualization), so the bundled `br`
      # can create VMs. One executable → no --deep / no inside-out pre-sign.
      - name: Sign Bladerunner.app
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail
          APP="dist-dmg/Bladerunner.app"
          codesign --force --options runtime --timestamp \
            --entitlements vz.entitlements \
            --sign "$SIGN_IDENTITY" "$APP"
          codesign --verify --deep --strict --verbose=2 "$APP"

      - name: Build + sign DMG
        env:
          SIGN_IDENTITY: ${{ secrets.DEVELOPER_ID_APPLICATION }}
        run: |
          set -euo pipefail
          STAGE="$(mktemp -d)/stage"; mkdir -p "$STAGE"
          cp -R dist-dmg/Bladerunner.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Bladerunner" -srcfolder "$STAGE" -ov -format UDZO "dist-dmg/${DMG}"
          codesign --force --sign "$SIGN_IDENTITY" "dist-dmg/${DMG}"
          codesign --verify --verbose=2 "dist-dmg/${DMG}"

      - name: Notarize + staple
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          OUT="dist-dmg/${DMG}"
          set +e
          SUBOUT="$(xcrun notarytool submit "$OUT" \
            --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" \
            --team-id "$APPLE_TEAM_ID" --wait --output-format json)"
          RC=$?
          set -e
          echo "$SUBOUT"
          STATUS="$(echo "$SUBOUT" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("status",""))' 2>/dev/null || echo '')"
          if [ "$RC" -ne 0 ] || [ "$STATUS" != "Accepted" ]; then
            UUID="$(echo "$SUBOUT" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("id",""))' 2>/dev/null || echo '')"
            [ -n "$UUID" ] && xcrun notarytool log "$UUID" --apple-id "$APPLE_ID" --password "$APPLE_PASSWORD" --team-id "$APPLE_TEAM_ID" || true
            echo "::error::DMG notarization failed (status='${STATUS}')."
            exit 1
          fi
          xcrun stapler staple "$OUT"
          xcrun stapler validate "$OUT"
          spctl -a -t open --context context:primary-signature -v "$OUT"
          (cd dist-dmg && shasum -a 256 "${DMG}" > "${DMG}.sha256")

      - name: Attach DMG to the release
        run: |
          set -euo pipefail
          gh release upload "$TAG" "dist-dmg/${DMG}" "dist-dmg/${DMG}.sha256" \
            --repo "$GITHUB_REPOSITORY" --clobber

      - name: Sync Homebrew cask to the tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          SHA="$(awk '{print $1}' "dist-dmg/${DMG}.sha256")"
          sed -e "s/PLACEHOLDER_VERSION/${VERSION}/g" \
              -e "s/PLACEHOLDER_SHA256_DMG/${SHA}/" \
              packaging/homebrew/bladerunner-app.rb > /tmp/bladerunner-app.rb
          cd /tmp
          rm -rf homebrew-tap
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/stuffbucket/homebrew-tap.git"
          mkdir -p homebrew-tap/Casks
          cp /tmp/bladerunner-app.rb homebrew-tap/Casks/bladerunner-app.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/bladerunner-app.rb
          git diff --cached --quiet || { git commit -m "bladerunner-app cask ${TAG}"; git push; }
