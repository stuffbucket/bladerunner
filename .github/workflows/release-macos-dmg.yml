name: Release macOS DMG

# Reusable: build Bladerunner.app, Developer-ID sign + notarize + staple it into
# a DMG, attach it to the release, and sync the Homebrew cask. Called by
# release-please.yml when the release is cut AND vars.ENABLE_SIGNED_DMG == 'true'.
#
# Runs on the SELF-HOSTED macOS runner (the same instance maximal uses), which
# already has the Developer ID identity in its login keychain and a stored
# notarytool credential profile — so NO Apple secrets are injected from GitHub.
# Notarizing the .dmg also notarizes the .app inside it (Apple notarizes nested
# files), so a separate .app notarize/staple isn't needed.
#
# Bladerunner.app has a single executable (the `br` binary), so — unlike
# maximal's Tauri+sidecar bundle — a plain top-level sign (VZ entitlement +
# hardened runtime) signs everything; no --deep, no inside-out pre-signing.
#
# ── ONE-TIME PREREQUISITES ──────────────────────────────────────────────────
#   1. The self-hosted macOS runner registered to this repo/org, with its login
#      keychain holding the Developer ID Application identity AND a notarytool
#      profile: xcrun notarytool store-credentials <profile> --apple-id ...
#   2. Repo variables:
#        ENABLE_SIGNED_DMG          = true            (turns this job on)
#        NOTARYTOOL_KEYCHAIN_PROFILE = <profile name>  (from step 1)
#        DMG_SIGN_IDENTITY          = <identity>       (optional; defaults to
#                                                       "Developer ID Application")
#   3. HOMEBREW_TAP_TOKEN secret (already present) for the cask push.
# Until ENABLE_SIGNED_DMG is set, the caller gates this off (releases unaffected).

on:
  workflow_call:
    inputs:
      tag:
        description: Release tag to build + attach the DMG for (e.g. v0.4.1)
        required: true
        type: string

permissions:
  contents: write

jobs:
  dmg:
    name: Signed + notarized DMG (arm64)
    runs-on: self-hosted
    env:
      GH_TOKEN: ${{ github.token }}
      TAG: ${{ inputs.tag }}
    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.tag }}
          fetch-depth: 0

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Resolve names
        run: |
          set -euo pipefail
          VERSION="${TAG#v}"
          {
            echo "VERSION=${VERSION}"
            echo "DMG=Bladerunner-${VERSION}.dmg"
          } >> "$GITHUB_ENV"

      - name: Build br + assemble Bladerunner.app
        run: |
          set -euo pipefail
          go build -trimpath -ldflags="-s -w -X main.version=${VERSION}" -o bin/br ./cmd/bladerunner
          rm -rf dist-dmg && mkdir -p dist-dmg
          ./bin/br menubar bundle --output dist-dmg
          ls -la dist-dmg/Bladerunner.app/Contents

      # Sign the .app with the Developer ID identity already in the runner's
      # (unlocked) login keychain + hardened runtime + the VZ entitlement
      # (com.apple.security.virtualization), so the bundled `br` can create VMs.
      # One executable → plain top-level sign, a --strict verify (no --deep),
      # no inside-out pre-sign. The identity is referenced by name (a repo
      # variable, not a secret); nothing Apple is injected from GitHub.
      - name: Sign Bladerunner.app
        env:
          SIGN_IDENTITY: ${{ vars.DMG_SIGN_IDENTITY || 'Developer ID Application' }}
        run: |
          set -euo pipefail
          APP="dist-dmg/Bladerunner.app"
          codesign --force --options runtime --timestamp \
            --entitlements vz.entitlements \
            --sign "$SIGN_IDENTITY" "$APP"
          codesign --verify --strict --verbose=2 "$APP"

      - name: Build + sign DMG
        env:
          SIGN_IDENTITY: ${{ vars.DMG_SIGN_IDENTITY || 'Developer ID Application' }}
        run: |
          set -euo pipefail
          STAGE="$(mktemp -d)/stage"; mkdir -p "$STAGE"
          cp -R dist-dmg/Bladerunner.app "$STAGE/"
          ln -s /Applications "$STAGE/Applications"
          hdiutil create -volname "Bladerunner" -srcfolder "$STAGE" -ov -format UDZO "dist-dmg/${DMG}"
          codesign --force --sign "$SIGN_IDENTITY" "dist-dmg/${DMG}"
          codesign --verify --verbose=2 "dist-dmg/${DMG}"

      # Notarize via the runner's stored notarytool keychain profile
      # (xcrun notarytool store-credentials <profile> ...), so no APPLE_ID /
      # app-password / team-id are injected from GitHub. Set the profile name in
      # the repo variable NOTARYTOOL_KEYCHAIN_PROFILE.
      - name: Notarize + staple
        env:
          NOTARY_PROFILE: ${{ vars.NOTARYTOOL_KEYCHAIN_PROFILE }}
        run: |
          set -euo pipefail
          if [ -z "${NOTARY_PROFILE:-}" ]; then
            echo "::error::Set repo variable NOTARYTOOL_KEYCHAIN_PROFILE to the runner's stored notarytool profile name."
            exit 1
          fi
          OUT="dist-dmg/${DMG}"
          set +e
          SUBOUT="$(xcrun notarytool submit "$OUT" --keychain-profile "$NOTARY_PROFILE" --wait --output-format json)"
          RC=$?
          set -e
          echo "$SUBOUT"
          STATUS="$(echo "$SUBOUT" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("status",""))' 2>/dev/null || echo '')"
          if [ "$RC" -ne 0 ] || [ "$STATUS" != "Accepted" ]; then
            UUID="$(echo "$SUBOUT" | python3 -c 'import sys,json; print(json.load(sys.stdin).get("id",""))' 2>/dev/null || echo '')"
            [ -n "$UUID" ] && xcrun notarytool log "$UUID" --keychain-profile "$NOTARY_PROFILE" || true
            echo "::error::DMG notarization failed (status='${STATUS}')."
            exit 1
          fi
          xcrun stapler staple "$OUT"
          xcrun stapler validate "$OUT"
          spctl -a -t open --context context:primary-signature -v "$OUT"
          (cd dist-dmg && shasum -a 256 "${DMG}" > "${DMG}.sha256")

      - name: Attach DMG to the release
        run: |
          set -euo pipefail
          gh release upload "$TAG" "dist-dmg/${DMG}" "dist-dmg/${DMG}.sha256" \
            --repo "$GITHUB_REPOSITORY" --clobber

      - name: Sync Homebrew cask to the tap
        env:
          TAP_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
        run: |
          set -euo pipefail
          SHA="$(awk '{print $1}' "dist-dmg/${DMG}.sha256")"
          sed -e "s/PLACEHOLDER_VERSION/${VERSION}/g" \
              -e "s/PLACEHOLDER_SHA256_DMG/${SHA}/" \
              packaging/homebrew/bladerunner-app.rb > /tmp/bladerunner-app.rb
          cd /tmp
          rm -rf homebrew-tap
          git clone "https://x-access-token:${TAP_TOKEN}@github.com/stuffbucket/homebrew-tap.git"
          mkdir -p homebrew-tap/Casks
          cp /tmp/bladerunner-app.rb homebrew-tap/Casks/bladerunner-app.rb
          cd homebrew-tap
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Casks/bladerunner-app.rb
          git diff --cached --quiet || { git commit -m "bladerunner-app cask ${TAG}"; git push; }
