name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Run weekly to catch new CVEs in existing deps
    - cron: '0 9 * * 1'

permissions:
  contents: read
  security-events: write

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Verify dependencies
        run: go mod verify

      - name: Build
        run: go build -v ./...

      - name: Test
        run: go test -race -coverprofile=coverage.out ./...

      - name: Upload coverage
        uses: codecov/codecov-action@v7
        if: ${{ !env.ACT }}
        with:
          files: ./coverage.out
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.11.4
          only-new-issues: true

  security:
    name: Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v7
        with:
          go-version-file: 'go.mod'
          cache: true

      - name: Run govulncheck
        run: ./scripts/govulncheck.sh

      - name: Run Trivy vulnerability scanner
        if: ${{ !env.ACT }}
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          severity: 'HIGH,CRITICAL'
          exit-code: '1'
          format: 'sarif'
          output: 'trivy-results.sarif'
          # This is the production gate for the shipped Go binary + OS packages.
          # The ./site landing page is a separate static sub-project whose npm
          # deps are build-time tooling only (nothing ships at runtime); they are
          # validated by the pages.yml build job, so exclude its lockfile here.
          skip-files: 'site/package-lock.json'

      - name: Upload Trivy scan results to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v4
        if: ${{ !env.ACT && always() && hashFiles('trivy-results.sarif') != '' }}
        with:
          sarif_file: 'trivy-results.sarif'

  check:
    name: check
    # Aggregator job: this is the single named status branch protection
    # (and repoman's REQUIRED_CHECK_NAME) gates on. Depends on the checks
    # that gate code correctness (build, lint). Security findings are
    # visible via the Security tab and the `security` job's status, but
    # don't gate routine PRs — upstream CVE drops shouldn't block
    # unrelated work, and govulncheck/trivy already upload SARIF.
    runs-on: ubuntu-latest
    needs: [build, lint]
    if: always()
    steps:
      - name: Aggregate result
        run: |
          if [[ "${{ contains(needs.*.result, 'failure') || contains(needs.*.result, 'cancelled') }}" == "true" ]]; then
            echo "One or more upstream jobs failed or were cancelled"
            exit 1
          fi
          echo "All upstream jobs succeeded"
