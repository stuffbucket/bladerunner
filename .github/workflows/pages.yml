name: Deploy landing site to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  # Validate the site build on PRs that touch it (the deploy job is gated to main).
  pull_request:
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: site
    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: site/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        env:
          # Optional pin: set the SITE_PIN_VERSION repo variable (e.g. v0.4.2)
          # to freeze the advertised version instead of tracking /releases/latest.
          # Manage with site-pin.yml; unset + redeploy to resume tracking latest.
          VITE_SITE_PIN_VERSION: ${{ vars.SITE_PIN_VERSION }}
          # Authenticate the releases/latest lookup in index.astro (raises the
          # anonymous 60-req/hr rate limit that a busy release day can exhaust).
          GITHUB_TOKEN: ${{ github.token }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: site/dist

  deploy:
    needs: build
    # Deploy only from main; on PRs the build job above just validates the site.
    if: github.event_name != 'pull_request' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
